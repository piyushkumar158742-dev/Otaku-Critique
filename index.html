<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Photo Filter</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        /* Universal reset completely kills rogue white lines, gaps, and borders */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            border: none;
            outline: none;
        }

        body {
            background-color: #0f1115;
            color: #e2e8f0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-wrapper {
            background-color: #1e2128;
            width: 100%;
            max-width: 900px;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .logo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
        }

        /* Loading Overlay Styles */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 33, 40, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #loading-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #333;
            border-top: 4px solid #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .workspace {
            background-color: #000;
            border-radius: 8px;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        input[type="file"] {
            display: none;
        }

        button, .custom-file-upload {
            background-color: #6366f1;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            font-size: 1rem;
        }

        button:hover:not(:disabled), .custom-file-upload:hover {
            background-color: #4f46e5;
        }

        button:active:not(:disabled), .custom-file-upload:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #374151;
            color: #9ca3af;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="app-wrapper">
        <header>
            <img src="logo.png" alt="Logo" class="logo">
            <h1>Photo Filter Studio</h1>
        </header>

        <main>
            <div id="loading-overlay" class="visible">
                <div class="spinner"></div>
                <p>Initializing Engine...</p>
            </div>

            <div class="workspace">
                <canvas id="editor-canvas"></canvas>
            </div>

            <div class="toolbar">
                <label for="image-upload" class="custom-file-upload">
                    Upload Photo
                </label>
                <input type="file" id="image-upload" accept="image/*">
                
                <button id="apply-filter" disabled>Apply Filter</button>
                <button id="download-btn" disabled>Download</button>
            </div>
        </main>
    </div>
    
    <script src="filter.js"></script>
    
    <script>
        const canvas = document.getElementById('editor-canvas');
        const ctx = canvas.getContext('2d');
        const uploadInput = document.getElementById('image-upload');
        const applyBtn = document.getElementById('apply-filter');
        const downloadBtn = document.getElementById('download-btn');
        const loadingOverlay = document.getElementById('loading-overlay');

        let currentImage = null;

        // Wait for the Emscripten Module to initialize
        var Module = Module || {};
        Module.onRuntimeInitialized = () => {
            loadingOverlay.classList.remove('visible');
        };

        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    currentImage = img;
                    applyBtn.disabled = false;
                    downloadBtn.disabled = false;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        applyBtn.addEventListener('click', () => {
            if (!currentImage) return;
            
            loadingOverlay.classList.add('visible');
            loadingOverlay.querySelector('p').innerText = "Processing Image...";

            setTimeout(() => {
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                
                const numBytes = data.length * data.BYTES_PER_ELEMENT;
                const ptr = Module._malloc(numBytes);
                Module.HEAPU8.set(data, ptr);

                Module.ccall(
                    'process_image',
                    null,
                    ['number', 'number', 'number'],
                    [ptr, canvas.width, canvas.height]
                );

                const resultView = new Uint8Array(Module.HEAPU8.buffer, ptr, numBytes);
                data.set(resultView);
                ctx.putImageData(imgData, 0, 0);

                Module._free(ptr);
                loadingOverlay.classList.remove('visible');
            }, 50);
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'filtered-photo.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
