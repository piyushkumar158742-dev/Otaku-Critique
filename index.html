<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Otaku Critique | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' }, // Vibrant Violet
                        surface: { 50: '#f8fafc', 800: '#1e293b', 900: '#0f172a' }
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.275)'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom Pro Typography & Utilities */
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        h1, h2, h3 { line-height: 1.15; letter-spacing: -0.03em; }
        
        /* Hide scrollbars but keep functionality */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* The "Shimmer" Hover Effect on Cards */
        .bento-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bento-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.15), 0 8px 10px -6px rgba(139, 92, 246, 0.1); border-color: #8b5cf6; }

        /* Toast Animation */
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast-enter { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* Disable number inputs */
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="flex h-screen overflow-hidden bg-surface-900 text-slate-100 antialiased">

    <aside class="hidden md:flex flex-col w-64 h-full border-r border-slate-800 bg-surface-900/50 backdrop-blur-xl z-50 transition-all duration-300">
        <div class="p-6 flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center shadow-lg shadow-brand-500/30">
                <i data-lucide="play" class="w-5 h-5 text-white"></i>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter text-white">Otaku<span class="text-brand-500">Critique</span></h1>
        </div>
        
        <nav class="flex-1 px-4 space-y-2 mt-4" id="nav-list">
            <button data-category="home" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all active:scale-95 group">
                <i data-lucide="home" class="w-5 h-5 group-hover:text-brand-400 transition-colors"></i><span class="font-medium">Home</span>
            </button>
            <button data-category="upcoming" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all active:scale-95 group">
                <i data-lucide="calendar-clock" class="w-5 h-5 group-hover:text-brand-400 transition-colors"></i><span class="font-medium">Upcoming</span>
            </button>
            <button data-category="movies" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all active:scale-95 group">
                <i data-lucide="film" class="w-5 h-5 group-hover:text-brand-400 transition-colors"></i><span class="font-medium">Movies</span>
            </button>
            <button data-category="pick" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:text-white hover:bg-slate-800/50 transition-all active:scale-95 group">
                <i data-lucide="flame" class="w-5 h-5 group-hover:text-brand-400 transition-colors"></i><span class="font-medium">Today's Pick</span>
            </button>
            
            <div class="pt-6 pb-2">
                <p class="px-4 text-xs font-bold uppercase tracking-wider text-slate-500">Your Dashboard</p>
            </div>
            <button data-category="mylist" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-brand-400 bg-brand-500/10 border border-brand-500/20 hover:bg-brand-500/20 transition-all active:scale-95 shadow-lg shadow-brand-500/5">
                <i data-lucide="library" class="w-5 h-5"></i><span class="font-bold">My List</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 h-full flex flex-col relative overflow-hidden bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-800/40 via-surface-900 to-surface-900">
        
        <header class="sticky top-0 z-40 w-full px-6 py-4 flex items-center justify-between gap-4 backdrop-blur-xl bg-surface-900/70 border-b border-slate-800/60">
            <button id="mobile-menu-btn" class="md:hidden p-2 text-slate-400 hover:text-white active:scale-95 transition-all"><i data-lucide="menu"></i></button>
            
            <div class="relative w-full max-w-md ml-auto">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500"></i>
                <input type="text" id="search-box" placeholder="Search anime, movies, or characters..." 
                    class="w-full pl-12 pr-4 py-3 bg-slate-800/50 border border-slate-700/50 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all shadow-inner placeholder-slate-500">
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-10 scroll-smooth" id="scroll-container">
            
            <div class="flex items-center justify-between mb-8">
                <h2 id="grid-title" class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-3">
                    <span class="w-2 h-8 rounded-full bg-brand-500"></span>
                    Discover
                </h2>
            </div>

            <div id="main-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"></div>

            <div id="my-list-container" class="hidden flex flex-col gap-8 w-full max-w-7xl mx-auto">
                <div class="bg-slate-800/30 border border-slate-700/50 rounded-3xl p-6 backdrop-blur-sm">
                    <h3 class="text-xl font-bold text-orange-400 mb-6 flex items-center gap-2"><i data-lucide="play-circle"></i> Currently Watching</h3>
                    <div id="grid-watching" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                </div>
                <div class="bg-slate-800/30 border border-slate-700/50 rounded-3xl p-6 backdrop-blur-sm">
                    <h3 class="text-xl font-bold text-blue-400 mb-6 flex items-center gap-2"><i data-lucide="calendar"></i> Going to Watch</h3>
                    <div id="grid-planned" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                </div>
                <div class="bg-slate-800/30 border border-slate-700/50 rounded-3xl p-6 backdrop-blur-sm">
                    <h3 class="text-xl font-bold text-green-400 mb-6 flex items-center gap-2"><i data-lucide="check-circle-2"></i> Completed</h3>
                    <div id="grid-completed" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>
                </div>
            </div>

            <div id="loading-trigger" class="hidden w-full py-12 flex justify-center">
                <i data-lucide="loader-2" class="w-8 h-8 text-brand-500 animate-spin"></i>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 right-6 hidden z-[9999] bg-slate-800 border border-slate-700 shadow-2xl shadow-brand-500/20 rounded-2xl p-4 flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-green-500/20 flex items-center justify-center text-green-400"><i data-lucide="check" class="w-5 h-5"></i></div>
        <p id="toast-msg" class="text-sm font-medium text-slate-200">Added to list</p>
    </div>

    <div id="movie-modal" class="fixed inset-0 z-[5000] hidden items-center justify-center px-4 py-6 sm:p-0">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative w-full max-w-4xl bg-slate-800 border border-slate-700 rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row max-h-[90vh] transition-spring transform scale-95 opacity-0" id="modal-content-box">
            
            <button onclick="closeModal()" class="absolute top-4 right-4 z-10 p-2 rounded-full bg-slate-900/50 hover:bg-slate-700 text-slate-400 hover:text-white backdrop-blur transition-all active:scale-90"><i data-lucide="x" class="w-6 h-6"></i></button>

            <div class="w-full md:w-1/3 bg-slate-900/50 p-6 flex flex-col items-center justify-start border-r border-slate-700/50 overflow-y-auto">
                <img id="modal-img" class="w-full max-w-[240px] rounded-2xl shadow-2xl object-cover" src="" alt="Poster">
                <div id="modal-actions" class="w-full mt-6 flex flex-col gap-3"></div>
            </div>

            <div class="w-full md:w-2/3 p-6 md:p-10 overflow-y-auto flex flex-col gap-6" id="modal-body">
                <div>
                    <h2 id="modal-title" class="text-3xl sm:text-4xl font-extrabold text-white mb-2 tracking-tight"></h2>
                    <div class="flex flex-wrap gap-2 text-sm font-medium text-slate-400 items-center">
                        <span id="modal-score" class="flex items-center gap-1 text-brand-400 bg-brand-500/10 px-2 py-1 rounded-md"><i data-lucide="star" class="w-4 h-4"></i></span>
                        <span id="modal-date" class="bg-slate-700/50 px-2 py-1 rounded-md"></span>
                        <span id="modal-status" class="bg-slate-700/50 px-2 py-1 rounded-md"></span>
                    </div>
                </div>
                <div id="modal-genres" class="flex flex-wrap gap-2"></div>
                <div class="prose prose-invert max-w-none">
                    <p id="modal-synopsis" class="text-slate-300 leading-relaxed text-sm sm:text-base"></p>
                </div>
                <div id="modal-trailer" class="w-full aspect-video rounded-2xl overflow-hidden bg-slate-900 mt-auto border border-slate-700/50 shadow-lg"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        const API_BASE = 'https://api.jikan.moe/v4';
        let otakuDatabase = JSON.parse(localStorage.getItem('otakuTrackerV2')) || {};
        let currentActiveAnime = null;
        let currentCategory = 'home';
        let currentPage = 1;
        let isFetching = false;
        let infiniteScrollEnabled = true;

        const DOM = {
            searchBox: document.getElementById('search-box'),
            mainGrid: document.getElementById('main-grid'),
            myListContainer: document.getElementById('my-list-container'),
            gridTitle: document.getElementById('grid-title'),
            loadingTrigger: document.getElementById('loading-trigger'),
            modal: document.getElementById('movie-modal'),
            modalBox: document.getElementById('modal-content-box'),
            navBtns: document.querySelectorAll('.nav-btn'),
            scrollContainer: document.getElementById('scroll-container')
        };

        // --- CORE INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            loadCategory('home', true);
            setupIntersectionObserver();
            
            DOM.navBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const cat = e.currentTarget.getAttribute('data-category');
                    DOM.navBtns.forEach(b => {
                        b.classList.remove('bg-slate-800/50', 'text-white');
                        b.classList.add('text-slate-400');
                    });
                    e.currentTarget.classList.remove('text-slate-400');
                    e.currentTarget.classList.add('bg-slate-800/50', 'text-white');
                    
                    if (cat === 'mylist') loadMyListDashboard();
                    else loadCategory(cat, true);
                });
            });
        });

        // --- SEARCH ---
        DOM.searchBox.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && DOM.searchBox.value.trim()) {
                const query = DOM.searchBox.value.trim();
                DOM.gridTitle.innerHTML = `<span class="w-2 h-8 rounded-full bg-brand-500"></span> Results for "${query}"`;
                currentCategory = 'search';
                infiniteScrollEnabled = false;
                DOM.mainGrid.classList.remove('hidden');
                DOM.myListContainer.classList.add('hidden');
                DOM.mainGrid.innerHTML = '';
                DOM.loadingTrigger.classList.remove('hidden');
                
                const res = await fetch(`${API_BASE}/anime?q=${encodeURIComponent(query)}&sfw=true`);
                const data = await res.json();
                DOM.loadingTrigger.classList.add('hidden');
                renderGrid(data.data.filter(a => a.images.jpg.large_image_url));
            }
        });

        // --- API FETCHING ---
        async function loadCategory(catKey, isNewCategory = false) {
            if(isFetching) return;
            isFetching = true;

            if (isNewCategory) {
                currentCategory = catKey;
                currentPage = 1;
                DOM.mainGrid.innerHTML = '';
                DOM.mainGrid.classList.remove('hidden');
                DOM.myListContainer.classList.add('hidden');
                infiniteScrollEnabled = (catKey !== 'pick'); 
                if (infiniteScrollEnabled) DOM.loadingTrigger.classList.remove('hidden');
            }

            let animes = [];
            try {
                if (catKey === 'home') {
                    DOM.gridTitle.innerHTML = `<span class="w-2 h-8 rounded-full bg-brand-500"></span> Discover Masterpieces`;
                    const res = await fetch(`${API_BASE}/top/anime?page=${currentPage}`);
                    animes = (await res.json()).data;
                } else if (catKey === 'upcoming') {
                    DOM.gridTitle.innerHTML = `<span class="w-2 h-8 rounded-full bg-brand-500"></span> Highly Hyped Upcoming`;
                    const res = await fetch(`${API_BASE}/top/anime?filter=upcoming&page=${currentPage}`);
                    animes = (await res.json()).data;
                } else if (catKey === 'movies') {
                    DOM.gridTitle.innerHTML = `<span class="w-2 h-8 rounded-full bg-brand-500"></span> Cinematic Features`;
                    const res = await fetch(`${API_BASE}/anime?type=movie&order_by=popularity&sort=desc&page=${currentPage}`);
                    animes = (await res.json()).data;
                } else if (catKey === 'pick') {
                    DOM.gridTitle.innerHTML = `<span class="w-2 h-8 rounded-full bg-brand-500"></span> Ranked Top 10 Today`;
                    const res = await fetch(`${API_BASE}/top/anime?filter=favorite&limit=25`);
                    let valid = (await res.json()).data.filter(a => a.images.jpg.large_image_url);
                    const startIdx = new Date().getDate() % valid.length; 
                    animes = valid.concat(valid).slice(startIdx, startIdx + 10);
                }

                renderGrid(animes.filter(a => a.images.jpg.large_image_url), catKey === 'pick');
            } catch (err) { console.error(err); } 
            finally { 
                isFetching = false; 
                setTimeout(() => lucide.createIcons(), 100);
            }
        }

        // --- RENDER GRID (Bento Style with Release Dates) ---
        function renderGrid(animes, isRanked = false) {
            if(animes.length === 0 && currentPage === 1) { DOM.mainGrid.innerHTML = '<p class="text-slate-500 col-span-full text-center py-10">No results found.</p>'; return; }
            
            animes.forEach((anime, index) => {
                const title = anime.title_english || anime.title;
                const img = anime.images.jpg.large_image_url;
                
                // Format Release Date
                let releaseDate = "Unknown Date";
                if (anime.aired && anime.aired.from) {
                    const dateObj = new Date(anime.aired.from);
                    releaseDate = dateObj.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                }

                const badge = isRanked ? `<div class="absolute top-2 left-2 bg-brand-500 text-white font-black w-8 h-8 rounded-full flex items-center justify-center shadow-lg border-2 border-slate-800 z-10">${index + 1}</div>` : '';

                const card = document.createElement('div');
                card.className = "bento-card relative group bg-slate-800 border border-slate-700/50 rounded-2xl overflow-hidden cursor-pointer flex flex-col";
                card.onclick = () => openModal(anime);
                card.innerHTML = `
                    ${badge}
                    <div class="relative w-full pt-[140%] overflow-hidden bg-slate-900">
                        <img src="${img}" loading="lazy" class="absolute inset-0 w-full h-full object-cover transition-transform duration-500 group-hover:scale-105">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/20 to-transparent opacity-80"></div>
                        <div class="absolute bottom-0 left-0 w-full p-4 flex flex-col justify-end">
                            <h3 class="text-white font-bold leading-tight mb-1 line-clamp-2">${title}</h3>
                            <div class="flex items-center gap-2 text-xs font-medium">
                                <span class="flex items-center gap-1 text-brand-400 bg-brand-500/20 px-2 py-0.5 rounded backdrop-blur-sm"><i data-lucide="star" class="w-3 h-3"></i> ${anime.score || 'N/A'}</span>
                                <span class="text-slate-300 bg-slate-800/80 px-2 py-0.5 rounded backdrop-blur-sm truncate"><i data-lucide="calendar" class="w-3 h-3 inline mr-1"></i>${releaseDate}</span>
                            </div>
                        </div>
                    </div>
                `;
                DOM.mainGrid.appendChild(card);
            });
        }

        // --- DASHBOARD (My List) ---
        function loadMyListDashboard() {
            infiniteScrollEnabled = false;
            DOM.mainGrid.classList.add('hidden');
            DOM.loadingTrigger.classList.add('hidden');
            DOM.myListContainer.classList.remove('hidden');
            DOM.gridTitle.innerHTML = `<span class="w-2 h-8 rounded-full bg-brand-500"></span> Your Collection`;

            ['watching', 'planned', 'completed'].forEach(status => {
                const container = document.getElementById(`grid-${status}`);
                container.innerHTML = '';
                
                const items = Object.values(otakuDatabase).filter(i => i.status === status);
                if(items.length === 0) {
                    container.innerHTML = `<div class="col-span-full text-center py-8 text-slate-500 border-2 border-dashed border-slate-700/50 rounded-2xl">Nothing here yet.</div>`;
                    return;
                }

                items.forEach(item => {
                    let epControls = '';
                    if(status === 'watching' && item.type !== 'Movie') {
                        epControls = `
                            <div class="flex items-center gap-2 mt-3" onclick="event.stopPropagation()">
                                <button onclick="changeEp(${item.id}, -1)" class="w-8 h-8 rounded-lg bg-slate-700 text-white hover:bg-brand-500 transition-colors flex items-center justify-center"><i data-lucide="minus" class="w-4 h-4"></i></button>
                                <input type="number" value="${item.progress}" onchange="setEp(${item.id}, this.value)" class="w-12 h-8 text-center bg-slate-900 border border-slate-700 rounded-lg text-sm font-bold focus:border-brand-500 focus:outline-none">
                                <button onclick="changeEp(${item.id}, 1)" class="w-8 h-8 rounded-lg bg-slate-700 text-white hover:bg-brand-500 transition-colors flex items-center justify-center"><i data-lucide="plus" class="w-4 h-4"></i></button>
                                <span class="text-xs text-slate-400 font-medium">/ ${item.totalEpisodes || '?'}</span>
                            </div>
                        `;
                    }

                    const card = document.createElement('div');
                    card.className = "group relative bg-slate-800 border border-slate-700/50 rounded-2xl p-3 flex gap-4 items-center cursor-pointer hover:border-brand-500 transition-colors shadow-sm hover:shadow-brand-500/10";
                    card.onclick = () => openFromDatabase(item.id);
                    card.innerHTML = `
                        <button onclick="event.stopPropagation(); removeFromList(${item.id})" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity shadow-lg z-10"><i data-lucide="x" class="w-3 h-3"></i></button>
                        <img src="${item.poster}" class="w-16 h-24 object-cover rounded-xl shadow-md flex-shrink-0">
                        <div class="flex-1 min-w-0">
                            <h4 class="font-bold text-sm text-white truncate">${item.title}</h4>
                            ${epControls}
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
            setTimeout(() => lucide.createIcons(), 100);
        }

        // --- TRACKER LOGIC ---
        function saveDatabase() { localStorage.setItem('otakuTrackerV2', JSON.stringify(otakuDatabase)); }
        
        window.openFromDatabase = async function(id) {
            try { const data = await (await fetch(`${API_BASE}/anime/${id}`)).json(); openModal(data.data); } catch(e) {}
        }
        window.changeEp = (id, delta) => setEp(id, (parseInt(otakuDatabase[id].progress) || 1) + delta);
        window.setEp = (id, val) => {
            const entry = otakuDatabase[id];
            let v = parseInt(val);
            if(v < 1) v = 1;
            if(entry.totalEpisodes && v >= entry.totalEpisodes) {
                v = entry.totalEpisodes;
                if(entry.airingStatus === 'Finished Airing') entry.status = 'completed';
            }
            entry.progress = v; saveDatabase(); loadMyListDashboard();
        }
        window.removeFromList = (id) => { delete otakuDatabase[id]; saveDatabase(); loadMyListDashboard(); showToast("Removed from list", "red"); }

        function updateListStatus(status) {
            const anime = currentActiveAnime;
            if(status === 'completed' && anime.status !== 'Finished Airing') return showToast("Anime hasn't finished airing yet!", "red");
            if(status === 'watching' && (anime.status === 'Not yet aired' || anime.status === 'Upcoming')) return showToast("Anime hasn't aired yet!", "red");

            const prev = otakuDatabase[anime.mal_id];
            let newProg = prev ? prev.progress : 1;
            if(prev && prev.status === 'completed' && status === 'watching') newProg = 1; // Strict Reset

            otakuDatabase[anime.mal_id] = {
                id: anime.mal_id, title: anime.title_english || anime.title, poster: anime.images.jpg.large_image_url,
                totalEpisodes: anime.episodes, type: anime.type, airingStatus: anime.status, status: status, progress: newProg
            };
            if(status === 'completed' && anime.episodes) otakuDatabase[anime.mal_id].progress = anime.episodes;
            
            saveDatabase(); refreshModalButtons(); showToast(`Added to ${status}`);
            if(!DOM.myListContainer.classList.contains('hidden')) loadMyListDashboard();
        }

        function refreshModalButtons() {
            const db = otakuDatabase[currentActiveAnime.mal_id];
            ['watching', 'planned', 'completed'].forEach(s => {
                const btn = document.getElementById(`btn-${s}`);
                if(!btn) return;
                if(db && db.status === s) btn.classList.add('ring-2', 'ring-white', 'scale-[1.02]', 'shadow-lg');
                else btn.classList.remove('ring-2', 'ring-white', 'scale-[1.02]', 'shadow-lg');
            });
        }

        // --- OPTIMISTIC UI: TOAST ---
        function showToast(msg, color = "green") {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.querySelector('div').className = `w-8 h-8 rounded-full bg-${color}-500/20 flex items-center justify-center text-${color}-400`;
            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');
            setTimeout(() => { toast.classList.add('hidden'); toast.classList.remove('toast-enter'); }, 3000);
        }

        // --- THE MODAL ---
        function openModal(anime) {
            if(!anime.genres) { fetch(`${API_BASE}/anime/${anime.mal_id}`).then(r=>r.json()).then(d => openModal(d.data)); return; }
            currentActiveAnime = anime;
            
            document.getElementById('modal-img').src = anime.images.jpg.large_image_url;
            document.getElementById('modal-title').innerText = anime.title_english || anime.title;
            document.getElementById('modal-score').innerHTML = `<i data-lucide="star" class="w-4 h-4"></i> ${anime.score || 'N/A'}`;
            document.getElementById('modal-status').innerText = anime.status;
            
            let releaseDate = "TBA";
            if (anime.aired && anime.aired.from) releaseDate = new Date(anime.aired.from).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            document.getElementById('modal-date').innerHTML = `<i data-lucide="calendar" class="w-4 h-4 inline mr-1"></i>${releaseDate}`;

            document.getElementById('modal-genres').innerHTML = (anime.genres || []).map(g => `<span class="px-3 py-1 bg-slate-700/50 rounded-full text-xs font-bold text-slate-300 border border-slate-600/50">${g.name}</span>`).join('');
            document.getElementById('modal-synopsis').innerText = anime.synopsis || "No synopsis available.";
            
            const tc = document.getElementById('modal-trailer');
            tc.innerHTML = anime.trailer.embed_url ? `<iframe src="${anime.trailer.embed_url}" allowfullscreen class="w-full h-full"></iframe>` : '<div class="w-full h-full flex items-center justify-center text-slate-500">No trailer available</div>';

            const acts = document.getElementById('modal-actions');
            if(anime.type === 'Movie' || anime.episodes === 1) {
                acts.innerHTML = `
                    <button id="btn-completed" class="w-full py-3 rounded-xl font-bold bg-green-600 hover:bg-green-500 text-white transition-all active:scale-95 disabled:opacity-50" onclick="updateListStatus('completed')" ${anime.status !== 'Finished Airing' ? 'disabled' : ''}>✔ Completed</button>
                    <button id="btn-planned" class="w-full py-3 rounded-xl font-bold bg-blue-600 hover:bg-blue-500 text-white transition-all active:scale-95" onclick="updateListStatus('planned')">🗓 Going to Watch</button>
                `;
            } else {
                acts.innerHTML = `
                    <button id="btn-completed" class="w-full py-3 rounded-xl font-bold bg-green-600 hover:bg-green-500 text-white transition-all active:scale-95 disabled:opacity-50" onclick="updateListStatus('completed')" ${anime.status !== 'Finished Airing' ? 'disabled' : ''}>✔ Completed</button>
                    <button id="btn-watching" class="w-full py-3 rounded-xl font-bold bg-orange-600 hover:bg-orange-500 text-white transition-all active:scale-95 disabled:opacity-50" onclick="updateListStatus('watching')" ${(anime.status === 'Not yet aired' || anime.status === 'Upcoming') ? 'disabled' : ''}>▶ Watching</button>
                    <button id="btn-planned" class="w-full py-3 rounded-xl font-bold bg-blue-600 hover:bg-blue-500 text-white transition-all active:scale-95" onclick="updateListStatus('planned')">🗓 Going to Watch</button>
                `;
            }

            refreshModalButtons();
            lucide.createIcons();
            
            DOM.modal.classList.remove('hidden');
            DOM.modal.classList.add('flex');
            setTimeout(() => {
                DOM.modalBox.classList.remove('scale-95', 'opacity-0');
                DOM.modalBox.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        window.closeModal = () => {
            DOM.modalBox.classList.remove('scale-100', 'opacity-100');
            DOM.modalBox.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                DOM.modal.classList.add('hidden');
                DOM.modal.classList.remove('flex');
                document.getElementById('modal-trailer').innerHTML = ''; // Stop video audio
            }, 300);
        }

        // Infinite Scroll Observer
        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && infiniteScrollEnabled && !isFetching) {
                    currentPage++; loadCategory(currentCategory, false);
                }
            }, { rootMargin: '300px' }); 
            observer.observe(DOM.loadingTrigger);
        }
    </script>
</body>
</html>
