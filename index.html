<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Critique - Anime Edition</title>
    <style>
        :root {
            --primary-bg: #041C23;
            --secondary-bg: #0A3641;
            --accent-color: #21E6C1;
            --text-light: #E8F9FD;
            --text-muted: #7FA9B5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--primary-bg); color: var(--text-light); overflow-x: hidden; }

        .navbar {
            position: sticky; top: 0; background-color: rgba(4, 28, 35, 0.95);
            backdrop-filter: blur(10px); display: flex; justify-content: space-between;
            align-items: center; padding: 1rem 2rem; border-bottom: 2px solid var(--accent-color);
            z-index: 1000;
        }

        .logo { font-size: 1.8rem; font-weight: bold; color: var(--accent-color); cursor: pointer; }
        .nav-links { list-style: none; display: flex; gap: 1.5rem; }
        .nav-links li { cursor: pointer; font-weight: 500; transition: color 0.3s; }
        .nav-links li:hover { color: var(--accent-color); }

        #search-box {
            padding: 0.6rem 1rem; width: 300px; border-radius: 20px; border: 1px solid var(--accent-color);
            background-color: var(--secondary-bg); color: var(--text-light); outline: none;
        }

        .main-content { padding: 2rem; }
        .section-title { margin-bottom: 1.5rem; color: var(--accent-color); border-left: 4px solid var(--accent-color); padding-left: 10px; text-transform: capitalize; }
        .hidden { display: none !important; }

        /* Hero Section - Top 2 Hyped Anime */
        .hero-picks { display: flex; gap: 2rem; height: 45vh; margin-bottom: 3rem; }
        
        .hero-card {
            flex: 1; border-radius: 10px; overflow: hidden; position: relative;
            cursor: pointer; transition: transform 0.3s; border: 1px solid var(--secondary-bg);
            display: flex; justify-content: center; align-items: center;
            background-color: #000;
        }

        .hero-card:hover { transform: scale(1.02); border-color: var(--accent-color); }

        .hero-bg {
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
            object-fit: cover; filter: blur(25px) opacity(0.4); z-index: 1;
        }

        /* Object-fit contain keeps it completely normal, no stretching */
        .hero-poster {
            height: 95%; width: auto; max-width: 100%; object-fit: contain; z-index: 2;
            box-shadow: 0 0 20px rgba(0,0,0,0.8); border-radius: 8px;
        }

        .hero-info {
            position: absolute; bottom: 0; left: 0; padding: 2rem 1.5rem 1.5rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            width: 100%; z-index: 3; text-align: center;
        }

        /* Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.5rem; }
        
        .movie-card {
            background-color: var(--secondary-bg); border-radius: 8px; cursor: pointer;
            transition: transform 0.3s; text-align: center; padding-bottom: 10px;
            border: 1px solid transparent; position: relative; display: flex; flex-direction: column;
        }
        .movie-card:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        
        /* Grid Images also kept contained/covered cleanly */
        .movie-card img { 
            width: 100%; height: 300px; object-fit: cover; 
            border-top-left-radius: 8px; border-top-right-radius: 8px; 
            background-color: #000;
        }
        .movie-card h3 { font-size: 1rem; padding: 10px 10px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Ranking Badge for Top 10 Picks */
        .rank-badge {
            position: absolute; top: -10px; left: -10px; background: var(--accent-color);
            color: var(--primary-bg); font-weight: bold; width: 35px; height: 35px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 50%; z-index: 5; font-size: 1.1rem; border: 2px solid var(--primary-bg);
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        /* Modal styling */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--primary-bg); padding: 2rem; border-radius: 10px; width: 90%;
            max-width: 1000px; max-height: 90vh; overflow-y: auto; position: relative; border: 1px solid var(--accent-color);
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; color: var(--accent-color); cursor: pointer; z-index: 10; }
        .modal-body { display: flex; gap: 2rem; flex-wrap: wrap; }
        
        /* Unstretched Modal Poster */
        .modal-poster { 
            width: 300px; height: auto; max-height: 450px; 
            object-fit: contain; border-radius: 8px; background-color: transparent;
        }
        
        .modal-details { flex: 1; min-width: 300px; }
        .modal-details h2 { color: var(--accent-color); margin-bottom: 10px; font-size: 2rem; }
        .modal-details p { margin-bottom: 8px; line-height: 1.6; color: var(--text-light); }
        .modal-details strong { color: var(--text-muted); }
        
        .trailer-container { margin-top: 20px; width: 100%; aspect-ratio: 16 / 9; }
        .trailer-container iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" id="site-logo">Screen Critique</div>
        <ul class="nav-links">
            <li data-category="upcoming">Upcoming</li>
            <li data-category="trending">Trending</li>
            <li data-category="best">Best Ever</li>
            <li data-category="pick">Today's Pick</li>
        </ul>
        <div class="search-container">
            <input type="text" id="search-box" placeholder="Search Anime... (Press Enter)">
        </div>
    </nav>

    <main class="main-content">
        <div id="hero-container">
            <section class="hero-picks" id="hero-picks"></section>
        </div>

        <section class="dynamic-movies">
            <h2 class="section-title" id="grid-title">Loading...</h2>
            <div class="movie-grid" id="main-grid"></div>
        </section>
    </main>

    <div id="movie-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.jikan.moe/v4';

        const DOM = {
            logo: document.getElementById('site-logo'),
            searchBox: document.getElementById('search-box'),
            mainGrid: document.getElementById('main-grid'),
            gridTitle: document.getElementById('grid-title'),
            heroContainer: document.getElementById('hero-container'),
            heroPicks: document.getElementById('hero-picks'),
            modal: document.getElementById('movie-modal'),
            modalBody: document.getElementById('modal-body')
        };

        // Core App Initialization
        document.addEventListener('DOMContentLoaded', () => {
            loadHeroPicks();
            loadCategory('trending');
        });

        // Navigation Events
        DOM.logo.addEventListener('click', () => {
            DOM.searchBox.value = '';
            DOM.heroContainer.classList.remove('hidden');
            loadCategory('trending');
        });

        document.querySelectorAll('.nav-links li').forEach(item => {
            item.addEventListener('click', (e) => {
                DOM.searchBox.value = '';
                DOM.heroContainer.classList.add('hidden');
                loadCategory(e.target.getAttribute('data-category'));
            });
        });

        // Accurate Anime Search
        DOM.searchBox.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && DOM.searchBox.value.trim()) {
                DOM.heroContainer.classList.add('hidden');
                const query = DOM.searchBox.value.trim();
                DOM.gridTitle.innerText = `Search Results: ${query}`;
                
                // Fetch search results
                const animes = await fetchAnimeData(`/anime?q=${encodeURIComponent(query)}&sfw=true`);
                renderGrid(animes, false);
            }
        });

        // Helper Function: Fetches data and instantly deletes any anime missing a poster OR a trailer
        async function fetchAnimeData(endpoint) {
            DOM.mainGrid.innerHTML = '<h2>Loading...</h2>';
            try {
                const res = await fetch(`${API_BASE}${endpoint}`);
                const data = await res.json();
                
                // STRICT FILTER: Must have a high-res image AND a YouTube trailer embed URL
                return data.data.filter(anime => 
                    anime.images.jpg.large_image_url && 
                    anime.trailer.embed_url
                );
            } catch (error) {
                console.error("Error fetching data:", error);
                return [];
            }
        }

        // Load the Top 2 Hyped Anime for the Hero Section
        async function loadHeroPicks() {
            // Fetching by pure popularity to get massive hype shows
            const animes = await fetchAnimeData('/top/anime?filter=bypopularity&limit=5');
            const topTwo = animes.slice(0, 2);
            
            DOM.heroPicks.innerHTML = '';
            
            topTwo.forEach(anime => {
                const card = document.createElement('div');
                card.className = 'hero-card';
                card.onclick = () => openModal(anime);
                
                const poster = anime.images.jpg.large_image_url;
                
                card.innerHTML = `
                    <img src="${poster}" class="hero-bg" alt="blur-bg">
                    <img src="${poster}" class="hero-poster" alt="${anime.title}">
                    <div class="hero-info">
                        <h2>${anime.title_english || anime.title}</h2>
                        <p style="color: var(--accent-color); font-weight: bold; margin-top: 5px;">
                            ★ ${anime.score || 'N/A'}/10 • ${anime.year || 'TBA'} • ${anime.status}
                        </p>
                    </div>
                `;
                DOM.heroPicks.appendChild(card);
            });
        }

        // Load Specific Categories
        async function loadCategory(catKey) {
            let endpoint = '';
            let isRankedPick = false;

            if (catKey === 'trending') {
                DOM.gridTitle.innerText = "Currently Trending Anime";
                endpoint = '/top/anime?filter=airing&limit=24';
            } 
            else if (catKey === 'upcoming') {
                DOM.gridTitle.innerText = "Highly Hyped Upcoming Anime";
                endpoint = '/top/anime?filter=upcoming&limit=24';
            } 
            else if (catKey === 'best') {
                DOM.gridTitle.innerText = "Highest Rated Anime Ever";
                endpoint = '/top/anime?limit=24';
            } 
            else if (catKey === 'pick') {
                DOM.gridTitle.innerText = "Today's Top 10 Picks";
                endpoint = '/top/anime?filter=favorite&limit=15'; // fetch 15, we'll slice to 10 after filtering
                isRankedPick = true;
            }

            let animes = await fetchAnimeData(endpoint);
            
            // If it's the daily pick, strictly enforce exactly 10 movies
            if (isRankedPick) {
                animes = animes.slice(0, 10);
            }

            renderGrid(animes, isRankedPick);
        }

        // Render Grid
        function renderGrid(animes, isRankedPick) {
            DOM.mainGrid.innerHTML = '';
            
            if (animes.length === 0) {
                DOM.mainGrid.innerHTML = '<p>No results found matching strict poster/trailer requirements.</p>';
                return;
            }

            animes.forEach((anime, index) => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openModal(anime); 
                
                const poster = anime.images.jpg.large_image_url;
                const title = anime.title_english || anime.title;
                
                // Add Rank Badge ONLY for 'pick' category
                let badgeHTML = isRankedPick ? `<div class="rank-badge">${index + 1}</div>` : '';

                card.innerHTML = `
                    ${badgeHTML}
                    <img src="${poster}" alt="${title}">
                    <h3>${title}</h3>
                `;
                DOM.mainGrid.appendChild(card);
            });
        }

        // Detailed Modal
        function openModal(anime) {
            const title = anime.title_english || anime.title;
            const genres = anime.genres ? anime.genres.map(g => g.name).join(', ') : 'N/A';
            const studios = anime.studios ? anime.studios.map(s => s.name).join(', ') : 'N/A';

            DOM.modalBody.innerHTML = `
                <img src="${anime.images.jpg.large_image_url}" class="modal-poster">
                <div class="modal-details">
                    <h2>${title}</h2>
                    <p><strong>Status:</strong> ${anime.status} (${anime.year || 'N/A'})</p>
                    <p><strong>Studio:</strong> ${studios}</p>
                    <p><strong>Episodes:</strong> ${anime.episodes || 'Unknown'}</p>
                    <p><strong>Genres:</strong> ${genres}</p>
                    <p><strong>Score:</strong> ${anime.score || 'N/A'}/10</p>
                    <p><strong>Synopsis:</strong> ${anime.synopsis || 'No synopsis available.'}</p>
                    
                    <div class="trailer-container">
                        <iframe src="${anime.trailer.embed_url}" allowfullscreen></iframe>
                    </div>
                </div>
            `;
            DOM.modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        // Close Modal
        const closeAndStopVideo = () => {
            DOM.modal.style.display = 'none';
            document.body.style.overflow = 'auto';
            DOM.modalBody.innerHTML = ''; // Kills the iframe so audio stops
        };
        document.getElementById('close-modal').onclick = closeAndStopVideo;
        window.onclick = (e) => { if (e.target === DOM.modal) closeAndStopVideo(); }
    </script>
</body>
</html>
